<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Console — UrbanRide</title>
  <link rel="stylesheet" href="/css/vendor.css">
  <link rel="icon" type="image/png" href="/images/ur.png">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
</head>

<body>

  <!-- ════════════════════════════════════════════
       LOGIN SCREEN
  ════════════════════════════════════════════ -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">🚖 UrbanRide</div>
      <div class="login-sub">Vendor Console</div>

      <input type="password" id="passwordInput" placeholder="Enter vendor password" />
      <p class="login-error" id="loginError">Incorrect password — try again.</p>
      <button class="login-btn" id="loginBtn">Access Dashboard →</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
       DASHBOARD
  ════════════════════════════════════════════ -->
  <div id="dashboard">

    <!-- Header -->
    <header class="dash-header">
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="dash-logo">UrbanRide</span>
        <span class="dash-badge">Vendor Console</span>
      </div>
      <div class="header-right">
        <div class="rt-indicator">
          <span class="rt-dot" id="rtDot"></span>
          <span id="rtLabel">Connecting…</span>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-cell">
        <div class="stat-icon pending">⏳</div>
        <div class="stat-info">
          <span class="stat-n" id="cnt-pending">0</span>
          <span class="stat-l">Awaiting</span>
        </div>
      </div>
      <div class="stat-cell">
        <div class="stat-icon accepted">🚗</div>
        <div class="stat-info">
          <span class="stat-n" id="cnt-accepted">0</span>
          <span class="stat-l">In Ride</span>
        </div>
      </div>
      <div class="stat-cell">
        <div class="stat-icon rejected">❌</div>
        <div class="stat-info">
          <span class="stat-n" id="cnt-rejected">0</span>
          <span class="stat-l">Rejected</span>
        </div>
      </div>
      <div class="stat-cell">
        <div class="stat-icon total">📋</div>
        <div class="stat-info">
          <span class="stat-n" id="cnt-total">0</span>
          <span class="stat-l">Total Today</span>
        </div>
      </div>
    </div>

    <!-- Active Ride Banner (hidden when no ride is in progress) -->
    <div class="active-ride-bar" id="activeRideBar" style="display:none">
      <div class="arb-left">
        <span class="arb-pulse"></span>
        <span class="arb-label">IN RIDE</span>
        <span class="arb-info" id="arbInfo">—</span>
      </div>
      <button class="end-ride-btn" id="endRideBtn">✓ End Ride</button>
    </div>

    <!-- Two-column console -->
    <div class="console-body">

      <!-- Left: Incoming / Pending -->
      <div class="console-col">
        <div class="col-header">
          <span class="col-title">Incoming Rides</span>
          <span class="count-badge" id="pendingBadge">0</span>
        </div>
        <div class="col-body" id="pendingCol">
          <div class="empty-col" id="pendingEmpty">
            <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 17v-2m3 2v-4m3 4v-6M4 21h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v15a1 1 0 001 1z"/>
            </svg>
            <p>No pending rides.<br>New bookings appear here instantly.</p>
          </div>
        </div>
      </div>

      <!-- Right: Recent Actions -->
      <div class="console-col">
        <div class="col-header">
          <span class="col-title">Recent Actions</span>
          <span class="count-badge" id="recentBadge">0</span>
        </div>
        <div class="col-body" id="recentCol">
          <div class="empty-col" id="recentEmpty">
            <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M5 13l4 4L19 7"/>
            </svg>
            <p>No actions yet.</p>
          </div>
        </div>
      </div>

    </div>
  </div><!-- end #dashboard -->

  <!-- ════════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════════ -->
  <script>
    const BACKEND = ['localhost','127.0.0.1'].includes(window.location.hostname)
      ? window.location.origin
      : 'https://urbanride.onrender.com';
    let token          = '';
    let socket         = null;
    let pollTimer      = null;
    let socketLive     = false;
    let activeRideId   = null;   // tracks the currently in-progress ride
    let activeRide     = null;   // full ride object for completed card data

    // ── Stats ─────────────────────────────────────────────
    const stats = { pending: 0, accepted: 0, rejected: 0, total: 0 };
    function updateStats() {
      document.getElementById('cnt-pending').textContent  = stats.pending;
      document.getElementById('cnt-accepted').textContent = stats.accepted;
      document.getElementById('cnt-rejected').textContent = stats.rejected;
      document.getElementById('cnt-total').textContent    = stats.total;
      const badge = document.getElementById('pendingBadge');
      badge.textContent = stats.pending;
      badge.className   = 'count-badge' + (stats.pending > 0 ? ' has-items' : '');
    }

    // ── Relative time ─────────────────────────────────────
    function relTime(dt) {
      if (!dt) return '';
      const diff = Date.now() - new Date(dt).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      return `${Math.floor(m / 60)}h ago`;
    }

    // ── Active ride banner ────────────────────────────────
    function showActiveBanner(r) {
      activeRideId = r.id;
      activeRide   = r;
      document.getElementById('arbInfo').textContent =
        `Ride #${r.id} · ${r.guest_name} · ${r.pickup} → ${r.dropoff} · ${r.vehicle_type}`;
      document.getElementById('activeRideBar').style.display = 'flex';
      document.getElementById('endRideBtn').dataset.id = r.id;
      disableAcceptButtons();
    }

    function clearActiveBanner() {
      activeRideId = null;
      activeRide   = null;
      document.getElementById('activeRideBar').style.display = 'none';
      document.getElementById('endRideBtn').dataset.id = '';
      enableAcceptButtons();
    }

    function disableAcceptButtons() {
      document.querySelectorAll('.btn-accept').forEach(b => {
        b.disabled = true;
        b.title    = 'End the current ride before accepting another';
      });
    }

    function enableAcceptButtons() {
      document.querySelectorAll('.btn-accept').forEach(b => {
        b.disabled = false;
        b.title    = '';
      });
    }

    // ── End ride ──────────────────────────────────────────
    document.getElementById('endRideBtn').addEventListener('click', async () => {
      const rideId = document.getElementById('endRideBtn').dataset.id;
      if (!rideId) return;

      const btn = document.getElementById('endRideBtn');
      btn.disabled = true;
      btn.textContent = 'Ending…';

      try {
        const res = await fetch(`${BACKEND}/api/vendor/end-ride/${rideId}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'x-vendor-token': token }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const ended = activeRide || { id: rideId, guest_name: `Ride #${rideId}`, pickup: '', dropoff: '' };
        clearActiveBanner();
        stats.accepted = Math.max(0, stats.accepted - 1);
        updateStats();
        showToast(`✅ Ride #${rideId} ended — invoice emailed to rider`);

        // Add to recent column with real ride data
        prependActionedCard(ended, 'completed');

      } catch (err) {
        showToast(`Error ending ride: ${err.message}`);
        btn.disabled = false;
        btn.textContent = '✓ End Ride';
      }
    });

    // ── Build pending ride card ───────────────────────────
    function buildPendingCard(r) {
      const card = document.createElement('div');
      card.className  = 'ride-card new-in';
      card.dataset.id = r.id;

      const dt = r.date_time
        ? new Date(r.date_time).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' })
        : '—';

      const acceptDisabled = activeRideId ? 'disabled title="End current ride first"' : '';

      card.innerHTML = `
        <div class="card-top">
          <span class="card-id">Ride #${r.id}</span>
          <span class="card-time">${relTime(r.date_time)}</span>
        </div>
        <div class="guest-name">${r.guest_name || '—'}</div>
        <div class="guest-phone">${r.phone || ''}</div>
        <div class="route-visual">
          <div class="route-point">
            <span class="route-dot pickup"></span>
            <span>${r.pickup || '—'}</span>
          </div>
          <div class="route-line"></div>
          <div class="route-point">
            <span class="route-dot dropoff"></span>
            <span>${r.dropoff || '—'}</span>
          </div>
        </div>
        <div class="card-meta">
          <span class="meta-chip">🚗 ${r.vehicle_type || '—'}</span>
          <span class="meta-chip">👥 ${r.passengers || 1} pax</span>
          <span class="meta-chip">🕐 ${dt}</span>
          ${r.trip_type ? `<span class="meta-chip">🗺 ${r.trip_type}</span>` : ''}
        </div>
        <div class="action-row">
          <button class="action-btn btn-accept" onclick="respond(${r.id},'accept',this)" ${acceptDisabled}>✅ Accept</button>
          <button class="action-btn btn-reject" onclick="respond(${r.id},'reject',this)">❌ Reject</button>
          <button class="action-btn btn-open"   onclick="respond(${r.id},'open_market',this)">📤 Open</button>
        </div>`;
      return card;
    }

    // ── Build actioned / recent card ──────────────────────
    function buildActionedCard(r, status) {
      const card = document.createElement('div');
      card.className  = 'actioned-card';
      card.dataset.id = r.id;

      const iconMap  = { accepted: '🚗', rejected: '❌', open_market: '📤', completed: '✅', cancelled: '🚫' };
      const labelMap = { accepted: 'In Ride', rejected: 'Rejected', open_market: 'Open Market', completed: 'Completed', cancelled: 'Cancelled' };

      card.innerHTML = `
        <div class="actioned-status ${status}">${iconMap[status] || '?'}</div>
        <div class="actioned-info">
          <div class="actioned-name">${r.guest_name || 'Ride #' + r.id}</div>
          <div class="actioned-route">${r.pickup || ''} → ${r.dropoff || ''}</div>
        </div>
        <span class="actioned-badge ${status}">${labelMap[status] || status}</span>`;
      return card;
    }

    // ── Respond to a pending ride ─────────────────────────
    async function respond(rideId, action, btn) {
      const card = btn.closest('.ride-card');
      card.querySelectorAll('.action-btn').forEach(b => b.disabled = true);

      try {
        const res = await fetch(`${BACKEND}/api/vendor/respond/${rideId}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'x-vendor-token': token },
          body:    JSON.stringify({ action })
        });

        // 409 = already have an active ride
        if (res.status === 409) {
          const { error } = await res.json();
          showToast(`⚠️ ${error}`);
          card.querySelectorAll('.action-btn').forEach(b => {
            b.disabled = b.classList.contains('btn-accept');
          });
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const { status, ride } = await res.json();

        card.classList.add('fade-out');
        card.addEventListener('animationend', () => card.remove(), { once: true });

        stats.pending = Math.max(0, stats.pending - 1);

        if (status === 'accepted') {
          stats.accepted++;
          if (ride) showActiveBanner(ride);
          else showActiveBanner({ id: rideId, guest_name: card.querySelector('.guest-name')?.textContent || '', pickup: '', dropoff: '', vehicle_type: '' });
        } else {
          if (status === 'rejected') stats.rejected++;
          prependActionedCard({
            id:         rideId,
            guest_name: card.querySelector('.guest-name')?.textContent,
            pickup:     card.querySelectorAll('.route-point')[0]?.querySelector('span:last-child')?.textContent,
            dropoff:    card.querySelectorAll('.route-point')[1]?.querySelector('span:last-child')?.textContent
          }, status);
        }

        updateStats();
        showToast(`Ride #${rideId} → ${status.replace('_', ' ')} ✓`);
        toggleEmpties();

      } catch (err) {
        card.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
        showToast(`Error: ${err.message}`);
      }
    }

    function prependActionedCard(r, status) {
      const col = document.getElementById('recentCol');
      document.getElementById('recentEmpty').style.display = 'none';
      col.insertBefore(buildActionedCard(r, status), col.firstChild);
      const badge = document.getElementById('recentBadge');
      badge.textContent = parseInt(badge.textContent || 0) + 1;
    }

    function toggleEmpties() {
      const cards = document.getElementById('pendingCol').querySelectorAll('.ride-card');
      document.getElementById('pendingEmpty').style.display = cards.length ? 'none' : 'flex';
    }

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg) {
      const t = document.createElement('div');
      t.className   = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    // ── Load existing rides on login ──────────────────────
    async function loadRides() {
      try {
        const res = await fetch(`${BACKEND}/api/vendor/rides`, { headers: { 'x-vendor-token': token } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { active, pending, recent } = await res.json();

        const pendingCol = document.getElementById('pendingCol');
        const recentCol  = document.getElementById('recentCol');

        // Active ride banner
        if (active && active.length > 0) {
          showActiveBanner(active[0]);
          stats.accepted = 1;
        }

        if (pending.length > 0) {
          document.getElementById('pendingEmpty').style.display = 'none';
          pending.forEach(r => pendingCol.appendChild(buildPendingCard(r)));
          stats.pending = pending.length;
        }

        if (recent.length > 0) {
          document.getElementById('recentEmpty').style.display = 'none';
          recent.forEach(r => {
            recentCol.appendChild(buildActionedCard(r, r.status));
            if (r.status === 'rejected') stats.rejected++;
          });
          document.getElementById('recentBadge').textContent = recent.length;
        }

        stats.total = (active?.length || 0) + pending.length + recent.length;
        updateStats();

      } catch (err) {
        showToast('Failed to load rides: ' + err.message);
      }
    }

    // ── HTTP fallback poll ────────────────────────────────
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(async () => {
        if (socketLive) { clearInterval(pollTimer); pollTimer = null; return; }
        try {
          const res = await fetch(`${BACKEND}/api/vendor/rides`, { headers: { 'x-vendor-token': token } });
          if (!res.ok) return;
          const { active, pending } = await res.json();
          const col = document.getElementById('pendingCol');

          // Sync active banner
          if (active && active.length > 0 && !activeRideId) showActiveBanner(active[0]);
          else if ((!active || active.length === 0) && activeRideId) clearActiveBanner();

          // Merge new pending cards
          let added = 0;
          pending.forEach(r => {
            if (!col.querySelector(`[data-id="${r.id}"]`)) {
              document.getElementById('pendingEmpty').style.display = 'none';
              col.appendChild(buildPendingCard(r));
              added++;
            }
          });
          if (added > 0) {
            stats.pending = col.querySelectorAll('.ride-card').length;
            stats.total   = stats.pending + stats.accepted + stats.rejected;
            updateStats();
          }
        } catch (_) {}
      }, 6000);
    }

    function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

    // ── Socket.io ─────────────────────────────────────────
    function connectSocket() {
      socket = io(BACKEND, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => { socket.emit('join_vendor', token); });

      socket.on('vendor_auth', ({ ok }) => {
        if (ok) {
          socketLive = true;
          stopPolling();
          document.getElementById('rtDot').classList.add('live');
          document.getElementById('rtLabel').textContent = 'Live';
        }
      });

      socket.on('new_ride', (booking) => {
        const col = document.getElementById('pendingCol');
        if (col.querySelector(`[data-id="${booking.id}"]`)) return;
        document.getElementById('pendingEmpty').style.display = 'none';
        col.prepend(buildPendingCard(booking));
        stats.pending++; stats.total++;
        updateStats();
        showToast(`🚖 New ride — #${booking.id} from ${booking.guest_name}`);
      });

      // Ride actioned by another session (or rider cancel)
      socket.on('ride_actioned', ({ id, status, ride }) => {
        const card = document.getElementById('pendingCol').querySelector(`[data-id="${id}"]`);
        if (card) {
          card.classList.add('fade-out');
          card.addEventListener('animationend', () => { card.remove(); toggleEmpties(); }, { once: true });
          stats.pending = Math.max(0, stats.pending - 1);
          updateStats();
        }
        if (status === 'accepted' && ride && !activeRideId) {
          stats.accepted++;
          showActiveBanner(ride);
          updateStats();
        }
      });

      // Driver ended the ride
      socket.on('ride_ended', ({ id }) => {
        if (String(id) === String(activeRideId)) {
          clearActiveBanner();
          stats.accepted = Math.max(0, stats.accepted - 1);
          updateStats();
        }
      });

      socket.on('disconnect', () => {
        socketLive = false;
        document.getElementById('rtDot').classList.remove('live');
        document.getElementById('rtLabel').textContent = 'Reconnecting…';
        startPolling();
      });
    }

    // ── Login ─────────────────────────────────────────────
    async function doLogin() {
      const pwd = document.getElementById('passwordInput').value.trim();
      if (!pwd) return;
      try {
        const res = await fetch(`${BACKEND}/api/vendor/rides`, { headers: { 'x-vendor-token': pwd } });
        if (res.status === 401) {
          document.getElementById('loginError').textContent = 'Incorrect password — try again.';
          document.getElementById('loginError').style.display = 'block'; return;
        }
        if (!res.ok) {
          document.getElementById('loginError').textContent = `Server error (${res.status}) — check Render deployment.`;
          document.getElementById('loginError').style.display = 'block'; return;
        }
        token = pwd;
        sessionStorage.setItem('vendorToken', token);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display   = 'flex';
        loadRides();
        connectSocket();
        startPolling();
      } catch (err) {
        document.getElementById('loginError').textContent = 'Connection failed — is the server running?';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('vendorToken');
      if (socket) socket.disconnect();
      stopPolling(); socketLive = false; activeRideId = null;
      document.getElementById('dashboard').style.display   = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      clearActiveBanner();
    });

    const stored = sessionStorage.getItem('vendorToken');
    if (stored) { document.getElementById('passwordInput').value = stored; doLogin(); }
  </script>
</body>
</html>
