<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Your Ride — UrbanRide</title>
  <link rel="stylesheet" href="/css/confirmation.css">
  <link rel="icon" type="image/png" href="/images/ur.png">
  <!-- Google Maps (sync so DirectionsService is ready) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGvVzJu_zA6-ngh8zYuXKABa_CPS6p9B4&libraries=places"></script>
  <!-- Socket.io real-time push -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
</head>

<body>

  <!-- ── Floating top bar ──────────────────────────────── -->
  <header class="track-topbar">
    <a href="/html/index.html" class="topbar-logo">UrbanRide</a>
    <div class="rt-pill">
      <span class="rt-dot" id="rtDot"></span>
      <span id="rtLabel">Connecting…</span>
    </div>
  </header>

  <!-- ── Full-screen map ──────────────────────────────── -->
  <div id="map"></div>

  <!-- ── Fare chip (floats just above the sheet) ───────── -->
  <div class="fare-chip" id="fareChip"></div>

  <!-- ── Bottom sheet ─────────────────────────────────── -->
  <div class="track-sheet" id="trackSheet">
    <div class="sheet-handle"></div>

    <!-- Header row: booking ref + guest name + status pill -->
    <div class="sheet-header">
      <div class="sheet-meta">
        <div class="booking-ref" id="bookingRef">Loading…</div>
        <div class="guest-name"  id="guestName">—</div>
      </div>
      <span class="status-pill" id="statusPill">Pending</span>
    </div>

    <!-- Progress steps -->
    <div class="steps-row">
      <div class="step done" id="step-booked">
        <div class="step-dot"></div>
        <div class="step-label">Booked</div>
      </div>
      <div class="step-line" id="line-1"></div>
      <div class="step active" id="step-accepted">
        <div class="step-dot"></div>
        <div class="step-label">Accepted</div>
      </div>
      <div class="step-line" id="line-2"></div>
      <div class="step" id="step-completed">
        <div class="step-dot"></div>
        <div class="step-label">Completed</div>
      </div>
    </div>

    <!-- Route mini (hidden until booking loads) -->
    <div class="route-mini" id="routeMini" style="display:none">
      <div class="route-row">
        <span class="rdot pickup"></span>
        <span id="pickupText">—</span>
      </div>
      <div class="route-row">
        <span class="rdot dropoff"></span>
        <span id="dropoffText">—</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="sheet-actions">
      <button class="btn-cancel"  id="cancelBtn">Cancel Ride</button>
      <a      class="btn-invoice" id="invoiceBtn" href="#" style="display:none">⬇ Invoice</a>
    </div>
  </div>

  <!-- ── Full-screen redirect overlay ─────────────────── -->
  <div class="redirect-overlay" id="redirectOverlay" style="display:none">
    <div class="redirect-card">
      <span class="redirect-icon" id="redirectIcon">🎉</span>
      <h2   id="redirectTitle">Driver Assigned!</h2>
      <p class="redirect-sub" id="redirectSub">
        Your driver is on the way. Redirecting to your dashboard…
      </p>
      <div class="countdown-ring">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle class="ring-track"    cx="40" cy="40" r="34"/>
          <circle class="ring-progress" cx="40" cy="40" r="34" id="ringProgress"/>
        </svg>
        <div class="ring-num" id="ringNum">5</div>
      </div>
    </div>
  </div>

  <!-- Audio cues -->
  <audio id="accept-sound" src="/audio/correct-356013.mp3"    preload="auto"></audio>
  <audio id="reject-sound" src="/audio/denied-sound-39708.mp3" preload="auto"></audio>

  <!-- ── App script ─────────────────────────────────────── -->
  <script>
    /* ── BACKEND ──────────────────────────────────────────── */
    const BACKEND = ['localhost', '127.0.0.1'].includes(window.location.hostname)
      ? window.location.origin
      : 'https://urbanride.onrender.com';

    /* ── DOM refs ─────────────────────────────────────────── */
    const bookingId   = new URLSearchParams(window.location.search).get('booking_id');
    const statusPill  = document.getElementById('statusPill');
    const cancelBtn   = document.getElementById('cancelBtn');
    const invoiceBtn  = document.getElementById('invoiceBtn');
    const rtDot       = document.getElementById('rtDot');
    const rtLabel     = document.getElementById('rtLabel');
    const fareChip    = document.getElementById('fareChip');
    const acceptSound = document.getElementById('accept-sound');
    const rejectSound = document.getElementById('reject-sound');

    let previousStatus = null;   // null so first applyStatus always renders
    let countdownTimer = null;

    /* ── Step/line helpers ────────────────────────────────── */
    function setStep(id, state) {   // state: 'done' | 'active' | ''
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'step' + (state ? ' ' + state : '');
    }
    function setLine(id, done) {
      const el = document.getElementById(id);
      if (el) el.className = 'step-line' + (done ? ' done' : '');
    }

    /* ── Google Maps dark-style route ─────────────────────── */
    function showGoogleRoute(pickup, dropoff) {
      const darkStyle = [
        { elementType: 'geometry',              stylers: [{ color: '#1a1a1a' }] },
        { elementType: 'labels.icon',           stylers: [{ visibility: 'off' }] },
        { elementType: 'labels.text.fill',      stylers: [{ color: '#757575' }] },
        { elementType: 'labels.text.stroke',    stylers: [{ color: '#1a1a1a' }] },
        { featureType: 'road',        elementType: 'geometry', stylers: [{ color: '#2d2d2d' }] },
        { featureType: 'road.highway',elementType: 'geometry', stylers: [{ color: '#444'    }] },
        { featureType: 'water',       elementType: 'geometry', stylers: [{ color: '#000'    }] },
        { featureType: 'poi',         stylers: [{ visibility: 'off' }] }
      ];
      const map = new google.maps.Map(document.getElementById('map'), {
        zoom: 11,
        center: { lat: 28.6139, lng: 77.2090 },
        styles: darkStyle,
        disableDefaultUI: false
      });
      new google.maps.TrafficLayer().setMap(map);

      const svc      = new google.maps.DirectionsService();
      const renderer = new google.maps.DirectionsRenderer({ suppressMarkers: false });
      renderer.setMap(map);

      svc.route({
        origin:      pickup,
        destination: dropoff,
        travelMode:  google.maps.TravelMode.DRIVING,
        drivingOptions: { departureTime: new Date(), trafficModel: 'bestguess' }
      }, (response, status) => {
        if (status !== 'OK') { console.error('Directions:', status); return; }
        renderer.setDirections(response);
        const leg  = response.routes[0].legs[0];
        const fare = Math.round(50 + (leg.distance.value / 1000) * 12);
        const dur  = leg.duration_in_traffic?.text || leg.duration.text;
        fareChip.textContent = `📍 ${leg.distance.text}  ·  ⏱ ${dur}  ·  Est. ₹${fare}`;
        fareChip.classList.add('visible');
      });
    }

    /* ── 5-second countdown overlay ──────────────────────── */
    function startCountdown(seconds, destination) {
      const overlay  = document.getElementById('redirectOverlay');
      const ringEl   = document.getElementById('ringProgress');
      const numEl    = document.getElementById('ringNum');
      const CIRCUMF  = 213.6;   // 2π × 34

      overlay.style.display = 'flex';
      numEl.textContent = seconds;
      ringEl.style.strokeDashoffset = '0';

      if (countdownTimer) clearInterval(countdownTimer);
      let remaining = seconds;

      countdownTimer = setInterval(() => {
        remaining--;
        numEl.textContent = remaining;
        ringEl.style.strokeDashoffset = CIRCUMF * (1 - remaining / seconds);
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          window.location.href = destination;
        }
      }, 1000);
    }

    /* ── Apply status ─────────────────────────────────────── */
    function applyStatus(status) {
      const s = (status || '').toLowerCase();
      if (s === previousStatus) return;
      previousStatus = s;

      statusPill.className = 'status-pill ' + s;
      invoiceBtn.style.display = 'none';

      switch (s) {

        case 'pending':
          statusPill.textContent = '⏳ Pending';
          setStep('step-booked',    'done');
          setStep('step-accepted',  'active');
          setStep('step-completed', '');
          setLine('line-1', false);
          setLine('line-2', false);
          cancelBtn.disabled = false;
          break;

        case 'accepted':
          statusPill.textContent = '✅ Accepted';
          setStep('step-booked',    'done');
          setStep('step-accepted',  'done');
          setStep('step-completed', 'active');
          setLine('line-1', true);
          setLine('line-2', false);
          cancelBtn.disabled = true;
          acceptSound.play().catch(() => {});
          // Uber-style overlay → redirect to dashboard
          document.getElementById('redirectIcon').textContent  = '🎉';
          document.getElementById('redirectTitle').textContent = 'Driver Assigned!';
          document.getElementById('redirectSub').textContent   =
            'Your driver is on the way. Taking you to your dashboard…';
          startCountdown(5, '/html/account.html');
          break;

        case 'completed':
          statusPill.textContent = '🏁 Completed';
          setStep('step-booked',    'done');
          setStep('step-accepted',  'done');
          setStep('step-completed', 'done');
          setLine('line-1', true);
          setLine('line-2', true);
          cancelBtn.disabled = true;
          invoiceBtn.href          = `${BACKEND}/invoice/${bookingId}`;
          invoiceBtn.style.display = 'inline-flex';
          // Uber-style "Ride ended" overlay
          document.getElementById('redirectIcon').textContent  = '✅';
          document.getElementById('redirectTitle').textContent = 'Ride Complete!';
          document.getElementById('redirectSub').textContent   =
            'Hope you had a great ride. Returning to your dashboard…';
          startCountdown(5, '/html/account.html');
          break;

        case 'rejected':
          statusPill.textContent = '❌ Rejected';
          setStep('step-booked',    'done');
          setStep('step-accepted',  '');
          setStep('step-completed', '');
          setLine('line-1', false);
          setLine('line-2', false);
          cancelBtn.disabled = true;
          rejectSound.play().catch(() => {});
          document.getElementById('redirectIcon').textContent  = '😔';
          document.getElementById('redirectTitle').textContent = 'Request Rejected';
          document.getElementById('redirectSub').textContent   =
            "The vendor couldn't accept your request. Let's find you another ride.";
          startCountdown(5, '/html/booking.html');
          break;

        case 'cancelled':
          statusPill.textContent = '🚫 Cancelled';
          setStep('step-booked',    'done');
          setStep('step-accepted',  '');
          setStep('step-completed', '');
          setLine('line-1', false);
          setLine('line-2', false);
          cancelBtn.disabled = true;
          document.getElementById('redirectIcon').textContent  = '🚫';
          document.getElementById('redirectTitle').textContent = 'Ride Cancelled';
          document.getElementById('redirectSub').textContent   =
            'Your ride has been cancelled. Returning to home…';
          startCountdown(5, '/html/index.html');
          break;

        case 'open_market':
          statusPill.textContent = '📤 Open Market';
          setStep('step-booked',    'done');
          setStep('step-accepted',  'active');
          setStep('step-completed', '');
          setLine('line-1', false);
          setLine('line-2', false);
          cancelBtn.disabled = false;
          break;

        default:
          statusPill.textContent = '⏳ Pending';
          setStep('step-booked',    'done');
          setStep('step-accepted',  'active');
          setStep('step-completed', '');
          setLine('line-1', false);
          setLine('line-2', false);
      }
    }

    /* ── Fetch booking details ─────────────────────────────── */
    async function fetchBookingDetails() {
      try {
        const res  = await fetch(`${BACKEND}/api/bookings?id=${bookingId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const b    = data.bookings?.[0];
        if (!b) {
          document.getElementById('bookingRef').textContent = 'Booking not found';
          return;
        }
        // Populate sheet
        document.getElementById('bookingRef').textContent  =
          '#UR-' + String(b.id).padStart(6, '0');
        document.getElementById('guestName').textContent   = b.guest_name  || '—';
        document.getElementById('pickupText').textContent  = b.pickup      || '—';
        document.getElementById('dropoffText').textContent = b.dropoff     || '—';
        document.getElementById('routeMini').style.display = '';

        showGoogleRoute(b.pickup, b.dropoff);
        applyStatus(b.status);   // render current DB status immediately
      } catch (err) {
        document.getElementById('bookingRef').textContent = `Error: ${err.message}`;
      }
    }

    /* ── Cancel booking ─────────────────────────────────────── */
    cancelBtn.addEventListener('click', () => {
      if (!confirm('Are you sure you want to cancel this ride?')) return;
      fetch(`${BACKEND}/api/bookings/${bookingId}/cancel`, { method: 'PATCH' })
        .then(async res => {
          if (res.ok) {
            applyStatus('cancelled');
          } else {
            const { error } = await res.json().catch(() => ({}));
            alert(error || 'Failed to cancel — please try again.');
          }
        })
        .catch(() => alert('Network error cancelling booking.'));
    });

    /* ── Socket.io — real-time vendor status push ────────────── */
    function connectSocket() {
      const socket = io(BACKEND, { transports: ['websocket', 'polling'] });

      function joinRoom() { socket.emit('join_booking', bookingId); }

      socket.on('connect', () => {
        rtDot.classList.add('connected');
        rtLabel.textContent = 'Live';
        joinRoom();   // (re)join on every connect / reconnect
      });
      socket.on('status_update', (data) => {
        if (String(data.bookingId) === String(bookingId)) applyStatus(data.status);
      });
      socket.on('disconnect', () => {
        rtDot.classList.remove('connected');
        rtLabel.textContent = 'Reconnecting…';
      });
      socket.on('connect_error', () => {
        rtDot.classList.remove('connected');
        rtLabel.textContent = 'Polling…';
      });
    }

    /* ── HTTP poll fallback — always on every 5 s ─────────────── */
    function startPolling() {
      setInterval(async () => {
        try {
          const res  = await fetch(`${BACKEND}/booking-status/${bookingId}`);
          const data = await res.json();
          if (data?.status) applyStatus(data.status);
        } catch (_) { /* silent */ }
      }, 5000);
    }

    /* ── Bootstrap ───────────────────────────────────────────── */
    if (!bookingId) {
      document.getElementById('bookingRef').textContent = 'No booking ID in URL';
    } else {
      fetchBookingDetails();
      connectSocket();
      startPolling();
    }
  </script>
</body>
</html>
